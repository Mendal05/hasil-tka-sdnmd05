<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Nilai TKA SDN Menteng Dalam 05 Pagi
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

<div class="container">

  <div class="card">

    <h1>Nilai TKA</h1>

    <h2>SDN Menteng Dalam 05 Pagi</h2>

    <p>
      Masukkan NISN untuk melihat nilai
    </p>

    <!-- INPUT NISN -->
    <input
      type="text"
      id="nisn"
      placeholder="Masukkan NISN"
    >

    <!-- BUTTON -->
    <button onclick="cekNilai()">
      Lihat Nilai
    </button>

    <!-- HASIL -->
    <div id="hasil"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
